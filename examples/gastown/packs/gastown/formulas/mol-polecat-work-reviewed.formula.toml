description = """
Reviewed polecat work lifecycle — investigation, planning, human review, TDD.

Like mol-polecat-work but adds three phases before implementation:
1. Investigation — read-only fact-gathering before writing code
2. Planning — write a plan to bead notes, request human review
3. Human checkpoint — wait for human approval (or revision feedback)

Plus: strict TDD discipline during implementation, stricter quality gates
(own regressions must be fixed, no "file bug and move on"), and integration
branch awareness for epic children.

Callers pour this formula with `--var issue=<bead-id>` and assign it
to a polecat. The polecat reads the formula steps and follows each one
in order. Crash-safe: re-read steps and resume from context.

Formula steps are NOT materialized as child beads. The polecat reads
the step descriptions and works through them sequentially.

## Polecat Contract (Self-Cleaning Model)

1. Receive work (molecule poured with this formula, assigned to you)
2. Investigate: understand the problem before writing code
3. Plan: write a plan, request human review
4. Wait: human reviews, may iterate via nudge, approves or rejects
5. Implement: strict TDD discipline (red-green-refactor)
6. Quality gate: all checks pass, own regressions fixed
7. Submit: push branch, set metadata on work bead, assign to refinery, exit
8. You are GONE — Refinery merges, closes the bead

**No MR beads.** Work beads flow directly: pool -> polecat -> refinery -> closed.
The polecat sets `metadata.branch` and `metadata.target` on the work bead
and reassigns it to the refinery. The refinery merges and closes.

**Rejection-aware.** If the work bead has `metadata.branch` and
`metadata.rejection_reason`, a previous attempt was rejected by the
refinery. Resume the existing branch — don't redo all the work.

**Integration-branch-aware.** If the work bead's parent epic has
`metadata.integration_branch`, the polecat targets that branch instead
of `base_branch`. The refinery reads `metadata.target` as always.

## Human Checkpoint Mechanism

The checkpoint uses existing primitives — no new SDK infrastructure:
- **Bead metadata** (`plan_status`): state machine
  `pending_review` -> `approved` (or `revise` -> `pending_review`, or `rejected` -> exit)
- **Bead notes**: plan content (persistent, crash-safe)
- **Mail**: notification to human (survives session death)
- **Event watch**: `gc events --watch --type=bead.updated` blocks until state changes
- **Nudge**: human sends feedback, polecat reads it and revises

Human can approve via:
- `bd update <bead> --set-metadata plan_status=approved` (direct CLI)
- `gc nudge <polecat> "approved"` (polecat reads and sets metadata itself)

## Variables

| Variable | Source | Description |
|----------|--------|-------------|
| issue | caller | The work bead ID assigned to this polecat |
| base_branch | caller | Base branch to rebase on (default: main) |
| setup_command | rig config | Setup/install command. Empty = skip. |
| typecheck_command | rig config | Type check command. Empty = skip. |
| test_command | rig config | Test command. Empty = skip. |
| lint_command | rig config | Lint command. Empty = skip. |
| build_command | rig config | Build command. Empty = skip. |
| review_timeout | caller | Polling interval for checkpoint (default: 60s) |

## Failure Modes

| Situation | Action |
|-----------|--------|
| Tests fail | Fix them. Do not proceed with failures. |
| Blocked on external | Mail Witness, mark yourself stuck |
| Context filling | `gc runtime request-restart` (blocks until controller kills you) |
| Unsure what to do | Mail Witness, don't guess |
| Plan rejected | Close bead, mail Witness, exit |
| Plan revision requested | Revise plan, re-enter checkpoint |"""
formula = "mol-polecat-work-reviewed"
version = 1

[vars]
[vars.issue]
description = "The work bead ID assigned to this polecat"
required = true

[vars.base_branch]
description = "The base branch to rebase on and compare against (e.g., main, integration/epic-id)"
default = "main"

[vars.setup_command]
description = "Setup/install command (e.g., pnpm install). Empty = skip."
default = ""

[vars.typecheck_command]
description = "Type check command (e.g., tsc --noEmit). Empty = skip."
default = ""

[vars.test_command]
description = "Command to run tests (auto-detected from rig settings)"
default = ""

[vars.lint_command]
description = "Command to run linting. Empty = skip."
default = ""

[vars.build_command]
description = "Command to run build. Empty = skip."
default = ""

[vars.review_timeout]
description = "Polling interval in seconds for human checkpoint event watch (default: 60)"
default = "60"

# ---------------------------------------------------------------------------
# Step 1: Load context and verify assignment
# ---------------------------------------------------------------------------
[[steps]]
id = "load-context"
title = "Load context, verify assignment, detect integration branch"
description = """
Initialize your session and understand your assignment.

**1. Prime your environment:**
```bash
gc prime                    # Load role context
bd prime                    # Load beads context
```

**2. Check your hook:**
```bash
bd list --assignee=$GC_AGENT --status=in_progress
```

The hook_bead is your assigned issue. Read it carefully:
```bash
bd show {{issue}}           # Full issue details
bd show {{issue}} --json | jq '.metadata'  # Check for existing metadata
```

**3. Check for rejection (IMPORTANT):**

If `metadata.rejection_reason` exists, this bead was previously attempted
and rejected by the refinery. Read the reason carefully:
- Rebase conflict -> you'll resume the existing branch and rebase
- Test failure -> you'll resume the branch and fix the issue

If `metadata.branch` exists, a branch already exists from the prior attempt.
You will use it in branch-setup instead of creating a new one.

**4. Detect integration branch (epic children):**

If this bead is a child of an epic, check the parent for an integration branch:
```bash
PARENT=$(bd show {{issue}} --json | jq -r '.parent // empty')
if [ -n "$PARENT" ]; then
    INT_BRANCH=$(bd show "$PARENT" --json | jq -r '.metadata.integration_branch // empty')
    if [ -n "$INT_BRANCH" ]; then
        bd update {{issue}} --set-metadata detected_target="$INT_BRANCH"
    fi
fi
```

If `detected_target` is set, this overrides `base_branch` for branching and
submitting. The refinery reads `metadata.target` — no refinery changes needed.

**5. Check inbox for additional context:**
```bash
gc mail inbox
# Read any HANDOFF or assignment messages, then archive after absorbing context
# gc mail read <id> → process → gc mail archive <id>
```

**6. Understand the requirements:**
- What exactly needs to be done?
- What files are likely involved?
- Are there dependencies or blockers?
- What does "done" look like?
- If rejected: what specifically needs fixing?

If blocked or unclear, mail Witness:
```bash
gc mail send <rig>/witness -s "HELP: Unclear requirements" -m "Issue: {{issue}}
Question: <what you need clarified>"
```

**Exit criteria:** You understand the work, integration branch (if any) is
detected, and you can begin."""

# ---------------------------------------------------------------------------
# Step 2: Branch setup
# ---------------------------------------------------------------------------
[[steps]]
id = "branch-setup"
title = "Set up worktree and working branch"
needs = ["load-context"]
description = """
Ensure you have an isolated git worktree and a clean feature branch.
Every check is idempotent — safe to re-run after crash/restart.

**Config: base_branch = {{base_branch}}**
**Config: setup_command = {{setup_command}}**

**Determine effective target branch:**

If `metadata.detected_target` was set in load-context, use it as the
target branch. Otherwise, fall back to `{{base_branch}}`.

```bash
TARGET=$(bd show {{issue}} --json | jq -r '.metadata.detected_target // empty')
if [ -z "$TARGET" ]; then
    TARGET="{{base_branch}}"
fi
```

**1. Fetch latest:**
```bash
git fetch --prune origin
```

**2. Ensure worktree exists.**

Check if `metadata.work_dir` already records your worktree path:
```bash
WORKTREE=$(bd show {{issue}} --json | jq -r '.metadata.work_dir // empty')
```

**If worktree path exists in metadata** — reuse it:
```bash
cd "$WORKTREE"              # Enter existing worktree
```
If the directory is missing (witness cleaned it, disk issue), fall through
to create a new one.

**If no worktree** — create one scoped to the bead, not the agent:
```bash
WORKTREE_PATH=$(pwd)/worktrees/{{issue}}
git worktree add "$WORKTREE_PATH" --detach origin/$TARGET
cd "$WORKTREE_PATH"
```
Record immediately so restarts and witness recovery can find it:
```bash
bd update {{issue}} --set-metadata work_dir="$WORKTREE_PATH"
```

Worktrees are scoped to the work bead (not the agent name) so that:
- An agent can pick up new work even if an old worktree is being recovered
- Multiple orphaned worktrees can coexist without collision
- The witness cleans them independently per-bead

**3. Ensure branch exists.**

Check if `metadata.branch` already records a branch:
```bash
BRANCH=$(bd show {{issue}} --json | jq -r '.metadata.branch // empty')
```

**If branch exists in metadata** — check it out:
```bash
git checkout "$BRANCH" 2>/dev/null || git checkout -b "$BRANCH" origin/"$BRANCH"
```
If resuming a rejected branch, rebase onto latest target:
```bash
REJECTION=$(bd show {{issue}} --json | jq -r '.metadata.rejection_reason // empty')
if [ -n "$REJECTION" ]; then
    git rebase origin/$TARGET
    # If conflicts: resolve them (this is likely the rejection reason)
    # After resolving: git rebase --continue
    bd update {{issue}} --unset-metadata rejection_reason
fi
```

**If no branch** — create one and record it:
```bash
BRANCH="polecat/{{issue}}"
git checkout -b "$BRANCH" origin/$TARGET
bd update {{issue}} --set-metadata branch="$BRANCH"
```

Recording the branch early means:
- Witness can find and salvage your work if you crash
- Rejection-aware resume knows which branch to check out
- The submit step updates the metadata (branch may change after rebase)

**4. Ensure clean working state:**
```bash
git status                  # Should be clean
```

**5. Run project setup (if configured):**
```bash
{{setup_command}}
```
Empty setup_command -> skip.

**Exit criteria:** In your worktree, on a clean feature branch, rebased
on latest target branch, deps installed, worktree and branch recorded
on the bead."""

# ---------------------------------------------------------------------------
# Step 3: Investigate (NEW)
# ---------------------------------------------------------------------------
[[steps]]
id = "investigate"
title = "Investigate: read-only fact-gathering"
needs = ["branch-setup"]
description = """
Understand the problem before writing any code. This step is READ-ONLY.
Do not make any changes to the codebase.

**Skip this step if resuming a rejected branch** — you already investigated
on the prior attempt. The rejection reason tells you what to fix. Close this
step and proceed to make-plan (or implement-tdd if your previous plan was
already approved).

**1. Read the issue thoroughly:**
```bash
bd show {{issue}}           # Re-read for full detail
```

**2. Explore the relevant code:**
- Find the files involved (grep, find, read)
- Understand the existing architecture and patterns
- Identify test files and existing test patterns
- Note any dependencies or side effects

**3. Check for related work:**
```bash
bd list --label=area:<relevant-area>  # Related beads
git log --oneline -20                 # Recent changes in the area
```

**4. Record your findings on the bead:**
```bash
bd update {{issue}} --notes "## Investigation

### Files involved
- <file>: <what it does, what needs changing>

### Key observations
- <pattern/convention to follow>
- <risk/dependency/gotcha>

### Open questions
- <anything unclear>
"
```

**DO NOT:**
- Write any code
- Create any branches
- Modify any files
- Start implementing

**Exit criteria:** You have a clear understanding of the problem, the
relevant code, and the approach — recorded in bead notes."""

# ---------------------------------------------------------------------------
# Step 4: Make plan (NEW)
# ---------------------------------------------------------------------------
[[steps]]
id = "make-plan"
title = "Write implementation plan and request review"
needs = ["investigate"]
description = """
Write a concrete implementation plan and request human review.

**Skip this step if resuming a rejected branch AND your previous plan
was already approved** — check `metadata.plan_status`. If it's `approved`,
proceed to implement-tdd. If it's `revise`, update the plan and re-enter
the checkpoint.

**1. Write the plan in bead notes:**
```bash
bd update {{issue}} --notes "## Implementation Plan

### Approach
<How you'll solve the problem — be specific>

### Changes
1. <file>: <what changes and why>
2. <file>: <what changes and why>

### Test strategy
- <What tests to write/modify>
- <How to verify correctness>

### Risks
- <What could go wrong>
- <Mitigation>

### Out of scope
- <What you will NOT do>
"
```

**2. Set plan status and notify human:**
```bash
bd update {{issue}} --set-metadata plan_status=pending_review
gc mail send $GC_CITY/mayor -s "REVIEW: Plan ready for {{issue}}" \
  -m "Plan written in bead notes. Review with: bd show {{issue}}
Approve: bd update {{issue}} --set-metadata plan_status=approved
Request changes: gc nudge $GC_AGENT \"<feedback>\"
Reject: bd update {{issue}} --set-metadata plan_status=rejected"
```

**Exit criteria:** Plan is written in bead notes, `plan_status=pending_review`
is set, human has been notified."""

# ---------------------------------------------------------------------------
# Step 5: Human checkpoint (NEW)
# ---------------------------------------------------------------------------
[[steps]]
id = "human-checkpoint"
title = "Wait for human plan approval"
needs = ["make-plan"]
description = """
Wait for the human to review your plan. This is a blocking step.

**On entry, check if already approved (crash recovery):**
```bash
STATUS=$(bd show {{issue}} --json | jq -r '.metadata.plan_status // empty')
```
If `STATUS` is `approved`, proceed immediately — don't wait again.

**1. Wait for plan_status to change:**

Poll the bead metadata for plan_status changes:
```bash
while true; do
    STATUS=$(bd show {{issue}} --json | jq -r '.metadata.plan_status // empty')
    case "$STATUS" in
        approved)
            break
            ;;
        rejected)
            # Human rejected the plan entirely
            bd update {{issue}} --notes "Plan rejected by reviewer."
            gc mail send <rig>/witness -s "NOTICE: Plan rejected for {{issue}}" \
              -m "Reviewer rejected the implementation plan. Bead returned to pool."
            bd update {{issue}} --status=open --unset-metadata plan_status --assignee=""
            gc runtime drain-ack
            exit
            ;;
        revise)
            # Human wants changes — check for nudge feedback
            # Read any nudge messages (they arrive as tmux input)
            # Revise the plan based on feedback
            bd update {{issue}} --set-metadata plan_status=pending_review
            gc mail send $GC_CITY/mayor -s "REVIEW: Revised plan for {{issue}}" \
              -m "Plan revised based on feedback. Review with: bd show {{issue}}"
            # Continue waiting
            ;;
        pending_review)
            # Still waiting — sleep and check again
            sleep {{review_timeout}}
            ;;
        *)
            # Unknown or missing status — treat as pending
            sleep {{review_timeout}}
            ;;
    esac
done
```

**2. Handle nudge feedback:**

If the human sends a nudge (via `gc nudge <polecat> "<feedback>"`), you
will receive it as tmux input. Read the feedback and:
- If it says "approved" -> set `plan_status=approved` yourself
- If it contains revision feedback -> update the plan, set `plan_status=pending_review`
- If it says "rejected" -> set `plan_status=rejected`

**If context filling up while waiting:**
```bash
gc runtime request-restart
```
On restart, this step's entry check will detect `approved` and proceed.

**Exit criteria:** `plan_status=approved` — human has signed off on the plan."""

# ---------------------------------------------------------------------------
# Step 6: Implement with TDD (replaces implement)
# ---------------------------------------------------------------------------
[[steps]]
id = "implement-tdd"
title = "Implement the solution with strict TDD discipline"
needs = ["human-checkpoint"]
description = """
Do the actual implementation work following strict TDD discipline.

If `inject_fragments` includes `tdd-discipline`, your prompt contains the
full TDD discipline rules. Follow them precisely.

**Working principles:**
- Follow existing codebase conventions
- Red-green-refactor: write a failing test FIRST, then make it pass, then clean up
- Make atomic, focused commits (test + implementation together)
- Keep changes scoped to the assigned issue
- Don't gold-plate or scope-creep

**If resuming a rejected branch:** Read `metadata.rejection_reason`
from load-context. Focus on fixing the specific issue that caused
rejection — don't redo everything. Still follow TDD: write a test that
reproduces the rejection failure, then fix it.

**The TDD cycle for each change:**

1. **Red:** Write a test that fails (captures the desired behavior)
```bash
# Run the test — confirm it fails
{{test_command}}
```

2. **Green:** Write the minimum code to make the test pass
```bash
# Run the test — confirm it passes
{{test_command}}
```

3. **Refactor:** Clean up without changing behavior
```bash
# Run all tests — confirm nothing broke
{{test_command}}
```

4. **Commit atomically:**
```bash
git add <test-file> <implementation-file>
git commit -m "<type>: <description> ({{issue}})"
```

Commit types: feat, fix, refactor, test, docs, chore

**When tests are NOT needed** (don't waste time):
- Trivial wiring (renaming, moving files with no logic change)
- Config-only changes (TOML, JSON, YAML)
- Formatting-only changes
- Documentation-only changes

**Discovered work (outside scope):**
```bash
bd create --title "Found: <description>" --type bug --priority 2
```
Do NOT fix unrelated issues in this branch.

**If stuck (>15 minutes):**
```bash
gc mail send <rig>/witness -s "HELP: Stuck on implementation" -m "Issue: {{issue}}
Problem: <what's blocking you>
Tried: <what you've attempted>"
```

**If context filling up:**
```bash
gc runtime request-restart
```
This blocks until the controller kills your session. The next session
resumes from context (re-reads formula steps, checks git/bead state).

**Exit criteria:** Implementation complete, all changes committed,
tests written for every behavioral change."""

# ---------------------------------------------------------------------------
# Step 7: Quality gate (replaces self-review)
# ---------------------------------------------------------------------------
[[steps]]
id = "quality-gate"
title = "Quality gate: review, test, fix own regressions"
needs = ["implement-tdd"]
description = """
Review your changes and verify they work. Stricter than self-review:
if YOUR changes caused a failure, you MUST fix it here. No "file a bug
and move on" for your own regressions.

**Config: setup_command = {{setup_command}}**
**Config: typecheck_command = {{typecheck_command}}**
**Config: lint_command = {{lint_command}}**
**Config: build_command = {{build_command}}**
**Config: test_command = {{test_command}}**

**1. Review the diff:**
```bash
TARGET=$(bd show {{issue}} --json | jq -r '.metadata.detected_target // empty')
[ -z "$TARGET" ] && TARGET="{{base_branch}}"
git diff origin/$TARGET...HEAD
git log --oneline origin/$TARGET..HEAD
git diff --stat origin/$TARGET...HEAD
```

Check for: bugs, security issues, style violations, missing error handling,
debug cruft, unintended file changes, missing tests. Fix anything you find.

**2. Verify test coverage:**
- Every behavioral change has a corresponding test
- Every bug fix has a regression test
- Tests are meaningful (not just "it doesn't crash")

**3. Run quality checks (skip empty commands):**
```bash
{{setup_command}}
{{typecheck_command}}
{{lint_command}}
{{build_command}}
{{test_command}}
```

**ALL CHECKS MUST PASS.**

**If your change caused the failure:** FIX IT. Do not proceed with
failing tests. Do not file a bug for your own regression. Go back to
implement-tdd and fix, following the TDD cycle (write a test for the
regression, fix it, verify).

**If pre-existing failure (not caused by your changes):** File a bead:
```bash
bd create --title "Pre-existing failure: <description>" --type bug --priority 1
gc mail send <rig>/witness -s "NOTICE: Pre-existing failure" \
  -m "Filed: <bead-id>. Not caused by {{issue}}."
```

**4. Ensure everything is committed:**
```bash
git status                  # Must be clean
git log origin/$TARGET..HEAD --oneline  # Must show your commits
```

If uncommitted changes exist:
```bash
git add -A && git commit -m "<type>: <description> ({{issue}})"
```

NEVER discard implementation changes with `git checkout -- .`

**Exit criteria:** All checks pass, all changes committed, working tree
clean, own regressions fixed (not deferred)."""

# ---------------------------------------------------------------------------
# Step 8: Submit to refinery and exit
# ---------------------------------------------------------------------------
[[steps]]
id = "submit-to-refinery"
title = "Submit work to refinery and exit"
needs = ["quality-gate"]
description = """
Hand off your work and self-clean. You cease to exist after this step.

**Determine effective target branch:**
```bash
TARGET=$(bd show {{issue}} --json | jq -r '.metadata.detected_target // empty')
if [ -z "$TARGET" ]; then
    TARGET="{{base_branch}}"
fi
```

**1. Final clean-state verification (safeguard):**
```bash
git status --porcelain
```
If ANY output (untracked files, uncommitted changes):
```bash
git add -A && git commit -m "chore: capture remaining work ({{issue}})"
```
This is a belt-and-suspenders check — quality-gate should have caught this,
but we never push with untracked work left behind.

**2. Push your branch:**
```bash
git push origin HEAD
```

**3. Update metadata on the work bead:**
```bash
BRANCH=$(git branch --show-current)
bd update {{issue}} \
  --set-metadata branch=$BRANCH \
  --set-metadata target=$TARGET \
  --notes "Implemented: <brief summary>"
```
Branch was recorded early in branch-setup; this updates it (may have
changed after rebase) and adds the target for the refinery.

The target respects the integration branch if one was detected in
load-context. The refinery reads `metadata.target` — no refinery
changes needed.

**4. Reassign to refinery:**
```bash
bd update {{issue}} --status=open --assignee=<rig>/refinery
```

The refinery will pick this up, rebase onto $TARGET, run tests,
merge, and close the bead. If there's a conflict, the refinery puts the
bead back in the pool with `rejection_reason` metadata — a new polecat
picks it up and resumes from the existing branch.

**5. Signal reconciler and exit.**
```bash
gc runtime drain-ack
exit
```

`gc runtime drain-ack` tells the reconciler to kill this session. The
reconciler only restarts you if the pool check command finds more work.
You are GONE. Done means gone. There is no idle state.

**Exit criteria:** Branch pushed, metadata set (including integration
branch target), bead reassigned, drain acknowledged, session exited."""
